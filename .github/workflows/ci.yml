name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  lint:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest

      - name: Check import structure
        run: python -c "
from src.harness.simulation_harness import SimulationHarness, SimulationResult, StepRecord
from src.mocks.mock_agent import MockAgent, MockTransport, CooperativeMessage
from src.failure.injector import FailureInjector, FailureType, FailurePlan
from src.scenarios.scenarios import create_ping_scenario, create_broadcast_scenario, create_ask_bytecode_scenario, create_failure_scenario
from src.fleet_compat import failure_to_fleet_status, failure_to_error_code, to_fleet_error, simulation_result_to_status, enrich_step_record_fleet
print('All imports OK')
"
